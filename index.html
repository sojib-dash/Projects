<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Typing Game</title>
		<style>
			body{ background: #051533; font-family: sans-serif; color: white;}
			.game_container{display:flex; gap:40px; justify-content: space-around;}
			.player_panel{background: #0c060f; padding: 20px; border-radius: 8px; width: 45%;}
			.track{background: #111; height: 50px; position: relative; border-radius: 4px; overflow: hidden;}
			.car { width: 40px; height: 40px; background: #ff4757; position: absolute; top: 5px; left: 0%; transition: left 0.1s linear; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold;}
			.text_display { font-size: 1.2rem; line-height: 1.5; margin-bottom: 15px; letter-spacing: 1px; }
			input { width: 93%; padding: 10px; font-size: 1rem; background: #333; color: white; border: 1px solid #444; border-radius: 4px; }
        	.stats { margin-top: 10px; font-weight: bold; font-size: 1.1rem; }
			.correct { color: #2ed573; background: rgba(46, 213, 115, 0.1); }
        	.incorrect { color: #ff4757; background: rgba(255, 71, 87, 0.2); text-decoration: underline; }
		</style>
	</head>

	<body>
		<h1 align="center"> Typing Engine </h1>
		<p align="center">Press keys in the inputs below to watch the engine track telemetry in real time.</p>
		
		<div class = "game_container">
			<div class="player_panel" id="p1_panel">
				<h2 id="fp"> Player 1 </h2>
				<div class="track"> <div class="car" id="car_1"> P1 </div> </div> <br>
				<div class = "text_display" id="p1_text"> </div>
				<input placeholder="Type here" type="text" id="p1_input" autocomplete="off">
				<div class="stats">WPM: <span id="p1_wpm">0</span> | Progress: <span id="p1_progress">0</span>%</div>
			</div>

			<div class="player_panel" id="p2_panel">
				<h2 id="sp"> Player 2 </h2>
				<div class="track"> <div class="car" id="car_2"> P2 </div> </div> <br>
				<div class = "text_display" id="p2_text"> </div>
				<input placeholder="Type here" type="text" id="p2_input" autocomplete="off">
				<div class="stats">WPM: <span id="p2_wpm">0</span> | Progress: <span id="p2_progress">0</span>%</div>
			</div>
		</div>

		<script > 
			const raceText = "The quick brown fox jumps over the lazy dog near a calm river.";
			class PlayerEngine{
				constructor(playerid, textdisplayid, inputid, carid, wpmid, progressid){
					this.player = playerid;
					this.textdisplay = document.getElementById(textdisplayid);
					this.input = document.getElementById(inputid);
        			this.car = document.getElementById(carid);
      			  	this.wpm = document.getElementById(wpmid);
        			this.progress = document.getElementById(progressid);
					this.targetText = raceText;

					this.startTime = null;
        			this.isFinished = false;

					this.updateTextDisplay("");
					this.input.addEventListener("input", () => this.handleInput());
				}

				updateTextDisplay(curr_in){
					let htmlOutput="";
					for(let i=0; i< this.targetText.length; i++){
						if(i < curr_in.length){
							if(curr_in[i] == this.targetText[i]){
								htmlOutput += `<span class="correct">${this.targetText[i]}</span>`;
							}
							else{
								htmlOutput += `<span class="incorrect">${this.targetText[i]}</span>`;
							}
						}
						else{
							htmlOutput += this.targetText[i];
						}
					}
					this.textdisplay.innerHTML = htmlOutput;
				}

				handleInput(){
					if(this.isFinished) return;
					if(!this.startTime) this.startTime = new Date();

					const value = this.input.value;
					let correctCount = 0;
					for(let i=0;i<value.length;i++){
						if(value[i] == this.targetText[i]){
							correctCount++;
						}
						else{
							break;
						}
					}
					this.updateTextDisplay(value);

					const progressPercentage = (correctCount/this.targetText.length)*100;
					this.progress.innerText = Math.floor(progressPercentage);

					this.car.style.left = `${Math.min(progressPercentage, 100) * 0.90}%`;
					const timeElapsedSeconds = (new Date() - this.startTime) / 1000;
					if(timeElapsedSeconds > 0.5 && correctCount>0){
						const wpm_c = (correctCount / 5) / (timeElapsedSeconds / 60);
						this.wpm.innerText = Math.round(wpm_c);
					}

					if(value == this.targetText){
						this.isFinished = true;
						this.input.disabled = true;
						alert(`${this.player} Finished the Race`);
					}
				}
			}

			const player1 = new PlayerEngine("Player 1" , "p1_text" , "p1_input" , "car_1" , "p1_wpm" , "p1_progress");
			const player2 = new PlayerEngine("Player 2" , "p2_text" , "p2_input" , "car_2" , "p2_wpm" , "p2_progress");
		</script>
	</body>
</html>
